name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  nix:
    name: Nix checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check formatting
        run: nix run nixpkgs#alejandra -- --check .

      - name: Build daedalus NixOS configuration
        run: nix build .#nixosConfigurations.daedalus.config.system.build.toplevel --no-link --print-build-logs
